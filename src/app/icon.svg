  <line x1="16" y1="8" x2="16" y2="20" stroke="#475569" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="16" y1="8" x2="26" y2="20" stroke="#475569" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="6" y1="20" x2="3" y2="28" stroke="#475569" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="6" y1="20" x2="10" y2="28" stroke="#475569" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="26" y1="20" x2="23" y2="28" stroke="#475569" stroke-width="1.4" stroke-linecap="round"/>
